<!DOCTYPE html>
<html lang="az"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İçərişəhər — Funksiya Təsviri və Qəbul Meyarları</title>
<style>
:root{--blue:#2D9CDB;--frame:#222B36;--ink:#1F2933;--ink2:#52606D;--faint:#9AA5B1;--line:#E4E9EF;--f:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--f);color:var(--ink);background:#EDF1F5;line-height:1.5}
.topbar{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1.5px solid var(--frame);display:flex;align-items:center;gap:14px;padding:10px 22px}
.topbar .back{font-size:13px;font-weight:600;color:var(--blue);text-decoration:none;white-space:nowrap}
.topbar .back:hover{text-decoration:underline}
.topbar .ttl{font-size:14px;font-weight:700;color:var(--ink);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.langsw{display:flex;gap:2px;background:#fff;border:1px solid var(--line);border-radius:20px;padding:3px;flex-shrink:0}
.langsw button{font-family:var(--f);font-size:11px;font-weight:700;letter-spacing:.03em;color:var(--ink2);background:transparent;border:none;border-radius:16px;padding:4px 11px;cursor:pointer;transition:.15s}
.langsw button:hover{color:var(--ink)}
.langsw button.on{background:var(--blue);color:#fff}
.dl{font-size:12.5px;font-weight:700;color:#fff;background:var(--blue);padding:7px 14px;border-radius:8px;text-decoration:none;white-space:nowrap;transition:.15s;flex-shrink:0}
.dl:hover{background:#2489C4}
.wrap{max-width:960px;margin:0 auto;padding:26px 22px 60px}
.hero{background:#fff;border:1.5px solid var(--frame);border-radius:14px;padding:22px 26px;margin-bottom:16px}
.hero h1{font-size:22px;font-weight:700;letter-spacing:-.01em}
.hero .s1{color:var(--ink2);font-size:13.5px;margin-top:6px}
.hero .s2{color:var(--faint);font-size:12px;margin-top:3px}
.toc{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-bottom:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:4px 18px}
.toc a{font-size:12.5px;color:var(--ink2);text-decoration:none;padding:3px 0;display:block}
.toc a:hover{color:var(--blue)}
.toc .tnum{font-weight:700;color:var(--blue);font-size:11px;margin-right:2px}
.howto{background:#F6F9FC;border:1px solid var(--line);border-radius:12px;padding:16px 20px;margin-bottom:20px}
.howto h3{font-size:13px;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink2)}
.howto ul{margin-left:18px}
.howto li{font-size:13px;color:var(--ink2);margin:4px 0}
.sec{background:#fff;border:1px solid var(--line);border-radius:14px;padding:20px 24px;margin-bottom:18px;scroll-margin-top:64px}
.sec h2{font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px;padding-bottom:10px;border-bottom:2px solid #EEF2F7;margin-bottom:8px}
.snum{color:var(--blue)}
.scode{margin-left:auto;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:10.5px;font-weight:700;color:#fff;background:#5B6675;padding:2px 8px;border-radius:5px}
.trk{font-size:11px;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;margin:2px 0 6px}
.sdesc{font-size:13px;color:var(--ink2);font-style:italic;margin:4px 0 12px}
.fn{border:1px solid var(--line);border-radius:10px;padding:12px 16px;margin:10px 0;background:#FBFCFE}
.fnhead{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.fid{font-family:ui-monospace,Menlo,Consolas,monospace;font-size:10.5px;font-weight:700;color:var(--faint);background:#EEF2F7;padding:2px 7px;border-radius:5px;flex-shrink:0}
.fname{font-size:13.5px;font-weight:700}
.pp{margin-left:auto;flex-shrink:0;font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px}
.P0{background:#FBEFD3;color:#9A6A12}.P1{background:#DCF0E9;color:#2E7D6B}.P2{background:#ECE6F2;color:#74619A}.PD{background:#EEF2F7;color:#8A94A3}
.ne{font-size:13px;color:var(--ink);margin:6px 0}
.ne b{color:var(--ink2)}
.qm{font-size:12px;font-weight:700;color:var(--ink2);text-transform:uppercase;letter-spacing:.04em;margin:8px 0 2px}
.crit{margin:2px 0 4px 20px}
.crit li{font-size:12.5px;color:var(--ink2);margin:3px 0}
@media print{.topbar{position:static}.dl,.back,.langsw{display:none}}
@media (max-width:640px){.topbar .ttl{display:none}.topbar{gap:8px;justify-content:space-between}}

<script>
var P = {"az": {"title": "İçərişəhər — Funksiya Təsviri və Qəbul Meyarları", "sub1": "Acceptance Criteria · Biznes · Dizayn · Development komandaları üçün", "sub2": "Versiya 1.0 · İyun 2026 · Futurelab × BIR Ekosistem", "howto": ["Nə edir: funksiyanın sadə dildə nə işə yaradığı.", "Qəbul meyarları: funksiya nə vaxt \"hazır\" sayılır — yoxlanıla bilən nəticələr.", "Prioritet: P0 = ilk launch üçün kritik, P1 = ikinci dalğa, P2 = sonrakı genişlənmə. (Fiziki və AI addımlarında prioritet \"—\" ilə işarələnir.)"], "sections": [{"num": "1.1", "name": "Qlobal elementlər", "code": "GLB", "track": "Web", "desc": "Bütün səhifələrdə təkrarlanan ortaq elementlər — başlıq, menyu, footer, dil seçimi. Bunlar saytın \"skeleti\"dir.", "fns": [{"id": "GLB-01", "name": "6 dil seçici (AZ/EN/RU/TR/AR/CN)", "pr": "P0", "ne": "Səhifənin yuxarı hissəsində dil seçmə düyməsi olur. İstifadəçi dili dəyişdikdə bütün interfeys mətnləri (menyu, düymələr, başlıqlar) həmin dildə göstərilir. Altı dil dəstəklənir: Azərbaycan, ingilis, rus, türk, ərəb və çin.", "crit": ["İstifadəçi açılan siyahıdan istənilən dili seçə bilir.", "Dil seçildikdən sonra səhifə həmin dildə yenilənir.", "Seçilmiş dil yadda saxlanılır (növbəti açılışda eyni qalır).", "Ərəb dilində mətn sağdan-sola düzgün göstərilir."]}, {"id": "GLB-06", "name": "Əsas naviqasiya menyusu (8 səhifə)", "pr": "P0", "ne": "Yuxarıda əsas menyu olur və istifadəçini saytın 8 əsas bölməsinə (Ana səhifə, Explore, Tours, Museums və s.) aparır. Mobil cihazda menyu \"hamburger\" düyməsi altında yığılır.", "crit": ["Bütün 8 əsas bölmə menyuda görünür.", "Menyu elementinə klik düzgün səhifəni açır.", "Hazırda açıq olan bölmə menyuda fərqlənir.", "Mobil cihazda menyu açılıb-bağlanır."]}, {"id": "GLB-07", "name": "Hero bölməsi + əsas CTA-lar", "pr": "P0", "ne": "Hər səhifənin yuxarısında böyük şəkil/başlıq sahəsi (hero) və əsas hərəkət düymələri (məs. \"Kəşf et\", \"Bilet al\") olur. Bu, istifadəçinin diqqətini ən vacib addıma yönəldir.", "crit": ["Hero sahəsi başlıq, qısa mətn və ən azı bir əsas düymə göstərir.", "Düyməyə klik uyğun səhifə və ya addıma aparır.", "Şəkil və mətn mobil ekranda düzgün uyğunlaşır."]}, {"id": "GLB-08", "name": "Footer — 6 sütun naviqasiya", "pr": "P0", "ne": "Səhifənin ən altında bütün vacib linkləri (bölmələr, əlaqə, sosial şəbəkə, hüquqi məlumat) qruplaşdıran footer olur. İstifadəçi istənilən səhifədən vacib keçidlərə çata bilir.", "crit": ["Footer əsas bölmələrə linkləri göstərir.", "Əlaqə və sosial şəbəkə linkləri işləyir.", "Footer bütün səhifələrdə eyni görünür."]}, {"id": "GLB-11", "name": "Responsive / mobil uyğunluq", "pr": "P0", "ne": "Bütün səhifələr telefon, planşet və kompüter ekranlarına avtomatik uyğunlaşır. Mətn, şəkil və düymələr hər ölçüdə rahat oxunur və toxunula bilir.", "crit": ["Səhifə telefonda yan-yana sürüşmə olmadan görünür.", "Düymələr barmaqla rahat basıla bilir.", "Şəkil və mətn ekran ölçüsünə görə düzülür."]}, {"id": "GLB-12", "name": "Dil yaddaşı", "pr": "P0", "ne": "İstifadəçinin seçdiyi dil brauzerdə yadda saxlanılır. Növbəti dəfə saytı açanda eyni dildə açılır, yenidən seçməyə ehtiyac qalmır.", "crit": ["Seçilmiş dil səhifə yeniləndikdə qalır.", "Sayt bağlanıb yenidən açılanda eyni dildə açılır."]}, {"id": "GLB-02", "name": "\"Today in İçərişəhər\" widget (hava, tədbir)", "pr": "P1", "ne": "Kiçik bir blok bu günün havasını və günün tədbirlərini göstərir. İstifadəçi səhifəni açan kimi indi nə baş verdiyini görür.", "crit": ["Cari hava göstərilir.", "Bugünkü tədbirlər (varsa) görünür.", "Məlumat yoxdursa, blok boş/qarışıq görünmür."]}, {"id": "GLB-03", "name": "Download App düyməsi", "pr": "P1", "ne": "Mobil tətbiq mövcud olduqda onu yükləmək üçün düymə göstərir (App Store / Google Play).", "crit": ["Düymə uyğun mağaza səhifəsinə aparır.", "Cihaza görə düzgün mağaza açılır."]}, {"id": "GLB-04", "name": "Get a Quote düyməsi (B2B)", "pr": "P1", "ne": "Korporativ/qrup müştərilər üçün təklif istəmə düyməsi. Klik etdikdə qısa sorğu forması açılır.", "crit": ["Düymə təklif/sorğu formasını açır.", "Forma göndərildikdə təsdiq mesajı çıxır."]}, {"id": "GLB-05", "name": "WhatsApp dəstək inteqrasiyası", "pr": "P1", "ne": "İstifadəçinin bir kliklə WhatsApp vasitəsilə dəstək xətti ilə əlaqə saxlamasına imkan verir.", "crit": ["Düymə WhatsApp söhbətini açır.", "Doğru nömrə/əlaqə avtomatik seçilir."]}, {"id": "GLB-09", "name": "Newsletter abunəlik forması", "pr": "P1", "ne": "İstifadəçi e-poçtunu yazıb xəbər bülletenia abunə ola bilir.", "crit": ["E-poçt daxil edilib göndərilə bilir.", "Yanlış e-poçt formatı xəbərdarlıq verir.", "Uğurlu abunədən sonra təsdiq göstərilir."]}, {"id": "GLB-10", "name": "Etibar zolağı (UNESCO, rəsmi loqolar)", "pr": "P1", "ne": "Rəsmi tərəfdaş və status loqolarını (məs. UNESCO) göstərən zolaq. İstifadəçidə etibar yaradır.", "crit": ["Loqolar düzgün və aydın göstərilir.", "Loqoya klik (varsa) müvafiq səhifəyə aparır."]}]}, {"num": "1.2", "name": "Ana səhifə", "code": "HOME", "track": "Web", "desc": "Saytın giriş səhifəsi — istifadəçini əsas bölmələrə yönləndirən vitrindir.", "fns": [{"id": "HOME-01", "name": "About İçərişəhər bloku", "pr": "P0", "ne": "İçərişəhər haqqında qısa, cəlbedici giriş mətni və şəkil göstərir. Məqsəd istifadəçiyə yerin nə olduğunu bir baxışda çatdırmaqdır. \"Ətraflı\" keçidi tam məlumat səhifəsinə aparır.", "crit": ["Giriş mətni və şəkil göstərilir.", "\"Ətraflı\" keçidi tam məlumata aparır.", "Mətn seçilmiş dildə görünür."]}, {"id": "HOME-02", "name": "Top Things to Do slayder", "pr": "P0", "ne": "Görüləsi ən maraqlı yerləri və təcrübələri yana sürüşən kartlar şəklində göstərir. İstifadəçi tez bir zamanda ən yaxşı seçimləri görür və birbaşa onların səhifəsinə keçə bilir.", "crit": ["Kartlar yana sürüşdürülə bilir.", "Karta klik onun detal səhifəsini açır.", "Mobil və kompüterdə düzgün görünür."]}, {"id": "HOME-03", "name": "Museums & Living Heritage bloku", "pr": "P0", "ne": "Seçilmiş muzeyləri və canlı irs məkanlarını şəkil və adla önə çıxarır. \"Hamısına bax\" keçidi ilə tam Museums səhifəsinə aparır.", "crit": ["Seçilmiş muzeylər şəkil və adla görünür.", "Karta klik muzey səhifəsini açır.", "\"Hamısına bax\" Museums səhifəsinə aparır."]}, {"id": "HOME-04", "name": "Guided Tours bloku", "pr": "P0", "ne": "Bələdçili turları tanıdan bölmə — bir neçə tur ad, müddət və qiymətlə göstərilir. İstifadəçini tur seçməyə və bron etməyə həvəsləndirir.", "crit": ["Turlar ad, müddət və qiymətlə kartda görünür.", "Karta klik tur detalına aparır.", "\"Bütün turlar\" Tours səhifəsinə keçir."]}, {"id": "HOME-06", "name": "Interactive Map preview bloku", "pr": "P0", "ne": "Tam interaktiv xəritənin kiçik önizləməsini göstərir. İstifadəçi şəhərin xəritəsini görüb tam xəritə təcrübəsinə keçə bilir.", "crit": ["Xəritənin kiçik versiyası görünür.", "Klik tam interaktiv xəritə səhifəsini açır."]}, {"id": "HOME-05", "name": "Cultural Life & Events bloku", "pr": "P1", "ne": "Yaxın tədbirləri və mədəni həyatı tarix və adla göstərir. İstifadəçi nə vaxt nə baş verdiyini görüb tədbirə keçə bilir.", "crit": ["Yaxın tədbirlər tarix və adla görünür.", "Tədbirə klik detalını açır.", "Tədbir yoxdursa uyğun mesaj göstərilir."]}, {"id": "HOME-07", "name": "Deals & Offers bloku", "pr": "P1", "ne": "Aktiv endirim və xüsusi təklifləri göstərir. İstifadəçini sərfəli təkliflərdən yararlanmağa yönəldir.", "crit": ["Aktiv təkliflər kartla görünür.", "Klik təklifin detalına/alışa aparır.", "Bitmiş təkliflər göstərilmir."]}, {"id": "HOME-08", "name": "The Stories bloku", "pr": "P2", "ne": "İçərişəhər haqqında hekayə və məqalələri şəkil və başlıqla göstərir. Məzmun marketinqi və dərin maraq üçündür.", "crit": ["Hekayələr şəkil və başlıqla görünür.", "Klik tam hekayəni açır."]}, {"id": "HOME-09", "name": "Press & Media Hub bloku", "pr": "P2", "ne": "Mətbuat və media materiallarına (xəbərlər, press-relizlər) keçid bölməsi.", "crit": ["Media/press linkləri görünür.", "Klik uyğun səhifəyə və ya fayla aparır."]}]}, {"num": "1.3", "name": "Explore", "code": "EXP", "track": "Web", "desc": "Şəhəri kəşf etmə bölməsi — axtarış, filtr və interaktiv xəritə ilə bütün maraqlı yerlər.", "fns": [{"id": "EXP-01", "name": "Axtarış paneli", "pr": "P0", "ne": "İstifadəçi yerin, məkanın və ya təcrübənin adını yazıb axtara bilir. Yazdıqca uyğun nəticələr təklif olunur.", "crit": ["Açar söz yazılıb axtarış edilə bilir.", "Uyğun nəticələr siyahıda göstərilir.", "Nəticə yoxdursa uyğun mesaj çıxır."]}, {"id": "EXP-02", "name": "Çoxlu filtr (kateqoriya, vaxt, maraq, Pass)", "pr": "P0", "ne": "Nəticələri kateqoriya, lazım olan vaxt, maraq sahəsi və Pass-a daxil olub-olmamasına görə süzgəcdən keçirir. İstifadəçi özünə uyğun yerləri tez tapır.", "crit": ["Bir neçə filtr eyni vaxtda tətbiq oluna bilir.", "Filtr dəyişdikdə nəticələr yenilənir.", "Filtrləri sıfırlamaq mümkündür."]}, {"id": "EXP-03", "name": "Kateqoriya plitkaları", "pr": "P0", "ne": "Əsas kateqoriyaları (muzey, tur, restoran, məscid və s.) böyük, kliklənən plitkalar şəklində göstərir. Sürətli giriş nöqtəsidir.", "crit": ["Kateqoriyalar plitkalarda görünür.", "Plitkaya klik həmin kateqoriyanı filtrləyir/açır."]}, {"id": "EXP-04", "name": "İnteraktiv xəritə (100+ POI)", "pr": "P0", "ne": "Şəhərin xəritəsində 100-dən çox maraq nöqtəsini (POI) göstərir. İstifadəçi xəritəni böyüdüb-kiçildə, nöqtələrə klik edib məlumat görə bilir.", "crit": ["Xəritədə nöqtələr düzgün yerlərdə görünür.", "Nöqtəyə klik qısa məlumat balonu açır.", "Xəritə böyüdülüb-kiçildilə və sürüşdürülə bilir.", "Kateqoriyaya görə nöqtələr filtrlənə bilir."]}, {"id": "EXP-05", "name": "Map / List view keçidi", "pr": "P0", "ne": "İstifadəçi nəticələri xəritə üzərində və ya siyahı şəklində görmək arasında keçid edə bilir.", "crit": ["Bir düymə ilə xəritə və siyahı arasında keçid olur.", "Hər iki görünüşdə eyni nəticələr göstərilir."]}, {"id": "EXP-09", "name": "POI detal səhifəsi", "pr": "P0", "ne": "Bir maraq nöqtəsinə klik edəndə açılan tam səhifə — şəkillər, təsvir, iş saatları, yerləşmə və əlaqəli yerlər. İstifadəçi qərar vermək üçün lazım olan hər şeyi viri düzgündür.", "Səhifələr axtarışda indekslənə bilir."]}, {"id": "TECH-11", "name": "Performans (Lighthouse, CDN)", "pr": "P1", "ne": "Saytın sürətli yüklənməsi və sabit işləməsi.", "crit": ["Səhifələr qəbul olunan müddətdə yüklənir.", "Şəkillər optimallaşdırılıb."]}]}, {"num": "1.15", "name": "Admin / CMS", "code": "ADMIN", "track": "Web", "desc": "Komandanın kontenti idarə etdiyi arxa panel — developer olmadan məzmun yenilənir.", "fns": [{"id": "ADMIN-01", "name": "Kontent idarəetmə (CRUD)", "pr": "P0", "ne": "Admin istifadəçiləri məzmunu (yer, tur, muzey və s.) əlavə edə, redaktə edə və silə bilir.", "crit": ["Yeni element əlavə oluna bilir.", "Mövcud element redaktə/silinə bilir.", "Dəyişiklik saytda görünür."]}, {"id": "ADMIN-02", "name": "Kontent modelləri (POI, tur, muzey, otel)", "pr": "P0", "ne": "Hər məzmun növü üçün strukturlaşdırılmış sahələr (ad, şəkil, qiymət və s.).", "crit": ["Hər növün öz sahələri var.", "Məcburi sahələr boş ötürülə bilmir."]}, {"id": "ADMIN-03", "name": "Çoxdilli kontent idarəetmə", "pr": "P0", "ne": "Hər məzmunun 6 dildə versiyasının idarə olunması.", "crit": ["Hər dil üçün ayrıca mətn daxil edilə bilir.", "Tərcümə olunmamış sahə qeyd olunur."]}, {"id": "ADMIN-04", "name": "Tədbir idarəetmə", "pr": "P1", "ne": "Tədbirlərin (tarix, yer, təsvir) əlavə və idarə olunması.", "crit": ["Tədbir əlavə/redaktə oluna bilir.", "Keçmiş tədbirlər avtomatik gizlənir."]}, {"id": "ADMIN-05", "name": "İstifadəçi rolları / icazələr", "pr": "P1", "ne": "Kim nəyi edə bilər — rol əsaslı icazələr.", "crit": ["Rollar təyin oluna bilir.", "İcazəsiz əməliyyat bloklanır."]}, {"id": "ADMIN-06", "name": "Analitika dashboard", "pr": "P1", "ne": "Əsas göstəricilərin (ziyarət, satış) admin panelində göstərilməsi.", "crit": ["Əsas metrikalar göstərilir.", "Tarix aralığı seçilə bilir."]}, {"id": "ADMIN-07", "name": "Sifariş / bron idarəetmə", "pr": "P1", "ne": "Sifariş və bronların admin tərəfindən görünməsi və idarəsi.", "crit": ["Sifarişlər siyahıda görünür.", "Status dəyişdirilə bilir."]}, {"id": "ADMIN-08", "name": "Media kitabxana", "pr": "P1", "ne": "Şəkil və faylların yüklənib təkrar istifadəsi.", "crit": ["Fayl yüklənə bilir.", "Yüklənmiş media yenidən istifadə oluna bilir."]}]}, {"num": "1.16", "name": "Marşrut & Naviqasiya (xəritədə)", "code": "ROUTE", "track": "Web", "desc": "İstifadəçinin interaktiv xəritə üzərində marşrut görməsi və AI əsaslı günlük plan alması. (Fiziki həll deyil — web funksionallığıdır.)", "fns": [{"id": "ROUTE-01", "name": "Xəritədə marşrut göstərmə (A→B)", "pr": "P1", "ne": "İstifadəçi iki nöqtə arasında (məs. girişdən Qız Qalasına) xəritədə yolu görür.", "crit": ["Başlanğıc və son nöqtə seçilə bilir.", "Xəritədə yol çəkilir.", "Təxmini məsafə/vaxt göstərilir."]}, {"id": "ROUTE-02", "name": "Yer axtar → ora marşrut", "pr": "P1", "ne": "İstifadəçi bir yeri axtarıb seçdikdə oraya gedən marşrutu görür.", "crit": ["Axtarılan yer xəritədə tapılır.", "Cari yerdən ora marşrut qurulur."]}, {"id": "ROUTE-03", "name": "AI əsaslı günlük plan (maraqlara görə)", "pr": "P1", "ne": "İstifadəçinin marağına və vaxtına görə süni intellekt günlük gəzinti planı təklif edir.", "crit": ["İstifadəçi maraq və vaxt seçə bilir.", "Sistem ardıcıl plan (yerlər + marşrut) təklif edir.", "Plan xəritədə göstərilir."]}, {"id": "ROUTE-04", "name": "Addım-addım istiqamət", "pr": "P1", "ne": "Marşrut boyunca addım-addım istiqamət (wayfinding) göstərir.", "crit": ["Hər addım aydın mətnlə göstərilir.", "İstifadəçi addımları izləyə bilir."]}, {"id": "ROUTE-05", "name": "Hazır tematik marşrutlar (xəritədə)", "pr": "P1", "ne": "Hazır mövzulu marşrutları (tarix, foto və s.) xəritədə təqdim edir.", "crit": ["Hazır marşrutlar siyahıda görünür.", "Marşrut xəritədə yüklənir."]}, {"id": "ROUTE-06", "name": "Çoxdilli marşrut təlimatları", "pr": "P2", "ne": "Marşrut təlimatlarının seçilmiş dildə göstərilməsi.", "crit": ["Təlimatlar seçilmiş dildə görünür."]}, {"id": "ROUTE-07", "name": "Marşrut boyu yaxın POI-lər", "pr": "P2", "ne": "Marşrut boyunca yaxınlıqdakı maraq nöqtələrini təklif edir.", "crit": ["Marşrut yanındakı yerlər göstərilir.", "Yerə klik detalını açır."]}]}, {"num": "2.1", "name": "\"Bu nədir\" bina etiketləri", "code": "LABEL", "track": "Fiziki", "desc": "Tarixi binalara yerləşdirilən fiziki etiketlər — QR ilə saytdakı məlumata bağlanır. Bunlar iş addımlarıdır.", "fns": [{"id": "LABEL-01", "name": "Etiketlənəcək binaların siyahısının tərtibi", "pr": "—", "ne": "Hansı binaların etiketlənəcəyinə qərar verilir və təsdiqlənmiş siyahı hazırlanır.", "crit": ["Bina siyahısı hazırlanıb.", "Siyahı sifarişçi tərəfindən təsdiqlənib."]}, {"id": "LABEL-02", "name": "Hər bina üçün qısa AZ/EN mətnlər", "pr": "—", "ne": "Hər bina üçün qısa, anlaşıqlı izah mətni Azərbaycan və ingilis dillərində yazılır.", "crit": ["Hər binanın AZ və EN mətni var.", "Mətnlər qısa və oxunaqlıdır."]}, {"id": "LABEL-03", "name": "Tarixi məlumatların ekspert yoxlaması", "pr": "—", "ne": "Mətnlərdəki tarixi faktlar ekspert tərəfindən yoxlanılır.", "crit": ["Mətnlər ekspert təsdiqindən keçib.", "Düzəlişlər tətbiq olunub."]}, {"id": "LABEL-04", "name": "Etiket dizaynı (material, ölçü, quraşdırma)", "pr": "—", "ne": "Etiketin görünüşü, materialı və quraşdırma üsulu dizayn olunur.", "crit": ["Dizayn nümunəsi hazırlanıb.", "Material və ölçü təsdiqlənib."]}, {"id": "LABEL-05", "name": "QR kod inteqrasiyası (web-ə keçid)", "pr": "—", "ne": "Hər etiketə QR kod əlavə olunur ki, saytdakı uyğun səhifəni açsın.", "crit": ["Hər etiketin unikal QR kodu var.", "QR skan düzgün səhifəni açır."]}, {"id": "LABEL-06", "name": "İstehsal", "pr": "—", "ne": "Təsdiqlənmiş etiketlər istehsal olunur.", "crit": ["Etiketlər istehsal olunub.", "Keyfiyyət yoxlanılıb."]}, {"id": "LABEL-07", "name": "Yerləşdirmə", "pr": "—", "ne": "Etiketlər müvafiq binalara quraşdırılır.", "crit": ["Etiketlər düzgün yerlərə quraşdırılıb.", "Yerləşdirmə icazəsi alınıb."]}]}, {"num": "2.2", "name": "\"Siz buradasınız\" giriş xəritələri", "code": "GATE", "track": "Fiziki", "desc": "Giriş nöqtələrində böyük oriyentasiya xəritələri — QR ilə saytdakı interaktiv xəritəyə bağlanır. Bunlar iş addımlarıdır.", "fns": [{"id": "GATE-01", "name": "Giriş nöqtələrinin müəyyənləşdirilməsi", "pr": "—", "ne": "Xəritələrin yerləşdiriləcəyi əsas giriş nöqtələri seçilir.", "crit": ["Giriş nöqtələri müəyyən edilib.", "Siyahı təsdiqlənib."]}, {"id": "GATE-02", "name": "Xəritə kontentinin hazırlanması (legenda)", "pr": "—", "ne": "Fiziki xəritənin məzmunu və işarələr cədvəli (legenda) hazırlanır.", "crit": ["Xəritə məzmunu hazırdır.", "Legenda aydın və düzgündür."]}, {"id": "GATE-03", "name": "Böyük formatda dizayn və çap", "pr": "—", "ne": "Xəritə böyük formatda dizayn olunub çapa hazırlanır.", "crit": ["Böyük format dizaynı hazırdır.", "Çap keyfiyyəti yoxlanılıb."]}, {"id": "GATE-04", "name": "QR kod ilə web platformaya yönləndirmə", "pr": "—", "ne": "Xəritəyə QR əlavə olunur ki, saytdakı interaktiv xəritəni açsın.", "crit": ["QR kod xəritədə var.", "Skan interaktiv xəritəni açır."]}, {"id": "GATE-05", "name": "Fiziki panel konstruksiyası və quraşdırma", "pr": "—", "ne": "Xəritə paneli hazırlanıb giriş nöqtələrinə quraşdırılır.", "crit": ["Panel quraşdırılıb.", "Quraşdırma icazəsi alınıb."]}, {"id": "GATE-06", "name": "Hava şəraitinə davamlı material", "pr": "—", "ne": "Panellər açıq havaya davamlı materialdan hazırlanır.", "crit": ["Material hava şəraitinə davamlıdır.", "Keyfiyyət yoxlanılıb."]}]}, {"num": "3.1", "name": "AI Audio Guide (Dalğa 1)", "code": "AG", "track": "AI", "desc": "Süni intellekt əsaslı səsli bələdçi — saytın içində modul kimi işləyir. Erkən, paralel başlaya bilən track.", "fns": [{"id": "AG-01", "name": "Bələdçi mətninin avtomatik yaradılması", "pr": "—", "ne": "Süni intellekt hər məkan üçün bələdçi mətnini istifadəçinin yeri və marağına uyğun avtomatik hazırlayır. Bu, hər yer üçün əl ilə mətn yazmaq ehtiyacını azaldır.", "crit": ["Məkana uyğun mətn avtomatik yaranır.", "Mətn marağa görə dəyişə bilir.", "Yaranan mətn admin tərəfindən yoxlana bilir."]}, {"id": "AG-02", "name": "Mətnin canlı səsə çevrilməsi (10+ dil)", "pr": "—", "ne": "Hazır mətn təbii səsli audioya çevrilir və bunu 10-dan çox dildə edir. Diktor yazdırmağa ehtiyac qalmır.", "crit": ["Mətn səsə çevrilir.", "10-dan çox dil dəstəklənir.", "Səs təbii və aydındır."]}, {"id": "AG-03", "name": "İstənilən dildə səsli bələdçi", "pr": "—", "ne": "İstifadəçi seçdiyi dildə audio bələdçini dinləyə bilir.", "crit": ["İstifadəçi dil seçə bilir.", "Audio seçilmiş dildə oxunur."]}, {"id": "AG-04", "name": "Məkana yaxınlaşanda avtomatik başlama", "pr": "—", "ne": "İstifadəçi bir məkana yaxınlaşanda (GPS) uyğun audio avtomatik başlayır.", "crit": ["Yaxınlaşanda uyğun audio təklif olunur/başlayır.", "GPS icazəsi yoxdursa əl ilə başlatmaq olur."]}, {"id": "AG-05", "name": "Bina yanında avtomatik audio (sensor)", "pr": "—", "ne": "Xüsusi sensorlar (BLE) vasitəsilə bina yaxınlığında dəqiq audio işə düşür.", "crit": ["Sensor yaxınlığında uyğun audio işə düşür.", "Sensor yoxdursa GPS/əl ilə işləyir."]}, {"id": "AG-06", "name": "Saytın içində işləməsi — ayrıca tətbiq yox", "pr": "—", "ne": "Audio bələdçi mövcud web platformaya modul kimi inteqrasiya olunur; istifadəçi ayrıca tətbiq yükləməyə məcbur deyil.", "crit": ["Audio bələdçi sayt daxilində işləyir.", "Ayrıca tətbiq tələb olunmur."]}, {"id": "AG-07", "name": "Audioların idarə olunması (admin)", "pr": "—", "ne": "Admin audio məzmununu (mətn, dil, yer) idarə edə bilir.", "crit": ["Audio məzmunu əlavə/redaktə oluna bilir.", "Dəyişiklik istifadəçiyə əks olunur."]}]}]}, "en": {"T.title": "Icherisheher — Feature Descriptions and Acceptance Criteria", "T.sub1": "Acceptance Criteria · For Business, Design and Development teams", "H.0": "What it does: what the feature is for, in plain language.", "H.1": "Acceptance criteria: when the feature counts as \"done\" — verifiable outcomes.", "H.2": "Priority: P0 = critical for first launch, P1 = second wave, P2 = later expansion. (For Physical and AI steps, priority is marked with \"—\".)", "GLB.name": "Global elements", "GLB.desc": "Shared elements repeated on every page — header, menu, footer, language selection. These are the \"skeleton\" of the site.", "GLB-01.n": "6-language selector (AZ/EN/RU/TR/AR/CN)", "GLB-01.ne": "A language selection control sits at the top of the page. When the user changes the language, all interface texts (menu, buttons, headings) are shown in that language. Six languages are supported: Azerbaijani, English, Russian, Turkish, Arabic and Chinese.", "GLB-01.c0": "The user can pick any language from the dropdown list.", "GLB-01.c1": "After a language is selected, the page updates in that language.", "GLB-01.c2": "The selected language is remembered (stays the same on the next visit).", "GLB-01.c3": "In Arabic, text is displayed correctly right-to-left.", "GLB-06.n": "Main navigation menu (8 pages)", "GLB-06.ne": "A main menu at the top takes the user to the site's 8 main sections (Home, Explore, Tours, Museums, etc.). On mobile the menu collapses under a \"hamburger\" button.", "GLB-06.c0": "All 8 main sections are visible in the menu.", "GLB-06.c1": "Clicking a menu item opens the correct page.", "GLB-06.c2": "The currently open section is highlighted in the menu.", "GLB-06.c3": "On mobile the menu opens and closes.", "GLB-07.n": "Hero section + main CTAs", "GLB-07.ne": "At the top of every page there is a large image/heading area (hero) and primary action buttons (e.g. \"Explore\", \"Buy a ticket\"). It directs the user's attention to the most important next step.", "GLB-07.c0": "The hero shows a heading, short text and at least one primary button.", "GLB-07.c1": "Clicking a button leads to the matching page or step.", "GLB-07.c2": "Image and text adapt correctly on mobile screens.", "GLB-08.n": "Footer — 6-column navigation", "GLB-08.ne": "At the very bottom of the page a footer groups all important links (sections, contact, social media, legal information). The user can reach key links from any page.", "GLB-08.c0": "The footer shows links to the main sections.", "GLB-08.c1": "Contact and social media links work.", "GLB-08.c2": "The footer looks the same on all pages.", "GLB-11.n": "Responsive / mobile compatibility", "GLB-11.ne": "All pages automatically adapt to phone, tablet and desktop screens. Text, images and buttons remain readable and tappable at every size.", "GLB-11.c0": "The page displays on a phone without horizontal scrolling.", "GLB-11.c1": "Buttons are comfortable to tap with a finger.", "GLB-11.c2": "Images and text rearrange based on screen size.", "GLB-12.n": "Language memory", "GLB-12.ne": "The user's chosen language is saved in the browser. The next time they open the site, it opens in the same language — no need to choose again.", "GLB-12.c0": "The chosen language persists when the page is refreshed.", "GLB-12.c1": "When the site is closed and reopened, it opens in the same language.", "GLB-02.n": "\"Today in Icherisheher\" widget (weather, events)", "GLB-02.ne": "A small block shows today's weather and today's events. The user sees what is happening right now as soon as they open the page.", "GLB-02.c0": "Current weather is displayed.", "GLB-02.c1": "Today's events (if any) are visible.", "GLB-02.c2": "If there is no data, the block does not look empty or broken.", "GLB-03.n": "Download App button", "GLB-03.ne": "When a mobile app is available, shows a button to download it (App Store / Google Play).", "GLB-03.c0": "The button leads to the correct store page.", "GLB-03.c1": "The right store opens depending on the device.", "GLB-04.n": "Get a Quote button (B2B)", "GLB-04.ne": "A quote request button for corporate/group clients. Clicking it opens a short inquiry form.", "GLB-04.c0": "The button opens the quote/inquiry form.", "GLB-04.c1": "A confirmation message appears when the form is submitted.", "GLB-05.n": "WhatsApp support integration", "GLB-05.ne": "Lets the user contact the support line via WhatsApp in one click.", "GLB-0  guide in any language", "AG-03.ne": "The user can listen to the audio guide in the language of their choice.", "AG-03.c0": "The user can choose a language.", "AG-03.c1": "The audio plays in the selected language.", "AG-04.n": "Auto-start when approaching a place", "AG-04.ne": "When the user approaches a place (GPS), the matching audio starts automatically.", "AG-04.c0": "On approach, the matching audio is offered/starts.", "AG-04.c1": "If there is no GPS permission, it can be started manually.", "AG-05.n": "Automatic audio near a building (sensor)", "AG-05.ne": "Via special sensors (BLE), precise audio triggers near a building.", "AG-05.c0": "Near a sensor, the matching audio starts.", "AG-05.c1": "Without a sensor, it works via GPS/manually.", "AG-06.n": "Runs inside the site — no separate app", "AG-06.ne": "The audio guide is integrated into the existing web platform as a module; the user is not forced to download a separate app.", "AG-06.c0": "The audio guide works inside the site.", "AG-06.c1": "No separate app is required.", "AG-07.n": "Audio management (admin)", "AG-07.ne": "The admin can manage audio content (text, language, place).", "AG-07.c0": "Audio content can be added/edited.", "AG-07.c1": "Changes are reflected to the user."}, "ru": {"T.title": "Ичеришехер — Описание функций и критерии приёмки", "T.sub1": "Acceptance Criteria · Для команд бизнеса, дизайна и разработки", "H.0": "Что делает: назначение функции простым языком.", "H.1": "Критерии приёмки: когда функция считается «готовой» — проверяемые результаты.", "H.2": "Приоритет: P0 = критично для первого запуска, P1 = вторая волна, P2 = дальнейшее расширение. (Для физических и AI-шагов приоритет обозначен «—».)", "GLB.name": "Глобальные элементы", "GLB.desc": "Общие элементы, повторяющиеся на всех страницах — шапка, меню, футер, выбор языка. Это «скелет» сайта.", "GLB-01.n": "Переключатель 6 языков (AZ/EN/RU/TR/AR/CN)", "GLB-01.ne": "В верхней части страницы есть элемент выбора языка. Когда пользователь меняет язык, все тексты интерфейса (меню, кнопки, заголовки) отображаются на этом языке. Поддерживаются шесть языков: азербайджанский, английский, русский, турецкий, арабский и китайский.", "GLB-01.c0": "Пользователь может выбрать любой язык из выпадающего списка.", "GLB-01.c1": "После выбора языка страница обновляется на этом языке.", "GLB-01.c2": "Выбранный язык запоминается (сохраняется при следующем открытии).", "GLB-01.c3": "Арабский текст корректно отображается справа налево.", "GLB-06.n": "Главное меню навигации (8 страниц)", "GLB-06.ne": "Вверху расположено главное меню, ведущее к 8 основным разделам сайта (Главная, Explore, Tours, Museums и др.). На мобильном меню сворачивается под кнопку-«гамбургер».", "GLB-06.c0": "Все 8 основных разделов видны в меню.", "GLB-06.c1": "Клик по пункту меню открывает нужную страницу.", "GLB-06.c2": "Текущий открытый раздел выделен в меню.", "GLB-06.c3": "На мобильном меню открывается и закрывается.", "GLB-07.n": "Hero-блок + главные CTA", "GLB-07.ne": "Вверху каждой страницы — крупная область с изображением/заголовком (hero) и основные кнопки действий (напр. «Исследовать», «Купить билет»). Направляет внимание пользователя на самый важный шаг.", "GLB-07.c0": "Hero показывает заголовок, короткий текст и минимум одну основную кнопку.", "GLB-07.c1": "Клик по кнопке ведёт на соответствующую страницу или шаг.", "GLB-07.c2": "Изображение и текст корректно адаптируются на мобильном экране.", "GLB-08.n": "Футер — навигация в 6 колонок", "GLB-08.ne": "В самом низу страницы футер группирует все важные ссылки (разделы, контакты, соцсети, юридическая информация). Пользователь может добраться до ключевых ссылок с любой страницы.", "GLB-08.c0": "Футер показывает ссылки на основные разделы.", "GLB-08.c1": "Ссылки на контакты и соцсети работают.", "GLB-08.c2": "Футер выглядит одинаково на всех страницах.", "GLB-11.n": "Адаптивность / мобильная совместимость", "GLB-11.ne": "Все страницы автоматически адаптируются к экранам телефона, планшета и компьютера. Текст, изображения и кнопки остаются удобными для чтения и нажатия при любом размере.", "GLB-11.c0": "Страница отображается на телефоне без горизонтальной прокрутки.", "GLB-11.c1": "Кнопки удобно нажимать пальцем.", "GLB-11.c2": "Изображения и текст выстраиваются по размеру экрана.", "GLB-12.n": "Запоминание языка", "GLB-12.ne": "Выбранный пользователем язык сохраняется в браузере. При следующем открытии сайт открывается на том же языке — выбирать заново не нужно.", "GLB-12.c0": "Выбранный язык сохраняется при обновлении страницы.", "GLB-12.c1": "После закрытия и повторного открытия сайт открывается на том же языке.", "GLB-02.n": "Виджет «Today in Icherisheher» (погода, события)", "GLB-02.ne": "Небольшой блок показывает сегодняшнюю погоду и события дня. Пользователь сразу видит, что происходит прямо сейчас.", "GLB-02.c0": "Отображается текущая погода.", "GLB-02.c1": "Видны сегодняшние события (если есть).", "GLB-02.c2": "Если данных нет, блок не выглядит пустым или сломанным.", "GLB-03.n": "Кнопка Download App", "GLB-03.ne": "Когда мобильное приложение доступно, показывает кнопку для его скачивания (App Store / Google Play).", "GLB-03.c0": "Кнопка ведёт на нужную страницу магазина.", "GLB-03.c1": "В зависимости от устройства открывается правильный магазин.", "GLB-04.n": "Кнопка Get a Quote (B2B)", "GLB-04.ne": "Кнопка запроса предложения для корпоративных/групповых клиентов. По клику открывается короткая форма запроса.", "GLB-04.c0": "Кнопка открывает форму запроса предложения.", "GLB-04.c1": "После отправки формы появляется подтверждение.", "GLB-05.n": "Интеграция поддержки WhatsApp", "GLB-05.ne": "Позволяет пользователю в один клик связаться с линией поддержки через WhatsApp.", "GLB-05.c0": "Кнопка открывает чат WhatsApp.", "GLB-05.c1": "Правильный номер/контакт выбирается автоматически.", "GLB-09.n": "Форма подписки на рассылку", "GLB-09.ne": "Пользователь может ввести e-mail и подписаться на новостную рассылку.", "GLB-09.c0": "E-mail можно ввести и отправить.", "GLB-09.c1": "Неверный формат e-mail вызывает предупреждение.", "GLB-09.c2": "После успешной подписки показывается подтверждение.", "GLB-10.n": "Полоса доверия (UNESCO, официальные логотипы)", "GLB-10.ne": "Полоса с логотипами официальных партнёров и статусов (напр. UNESCO). Создаёт доверие у пользователя.", "GLB-10.c0": "Логотипы отображаются корректно и чётко.", "GLB-10.c1": "Клик по логотипу (если есть ссылка) ведёт на соответствующую страницу.", "HOME.name": "Главная страница", "HOME.desc": "Входная страница сайта — витрина, направляющая пользователя к основным разделам.", "HOME-01.n": "Блок About Icherisheher", "HOME-01.ne": "Показывает короткий, привлекательный вводный текст и изображение об Ичеришехер. Цель — с первого взгляда передать, что это за место. Ссылка «Подробнее» ведёт на страницу с полной информацией.", "HOME-01.c0": "Отображаются вводный текст и изображение.", "HOME-01.c1": "Ссылка «Подробнее» ведёт к полной информации.", "HOME-01.c2": "Текст отображается на выбранном языке.", "HOME-02.n": "Слайдер Top Things to Do", "HOME-02.ne": "Показывает самые интересные места и впечатления в виде листаемых карточек. Пользователь быстро видит лучшие варианты и может сразу перейти на их страницы.", "HOME-02.c0": "Карточки можно листать в сторону.", "HOME-02.c1": "Клик по карточке открывает её детальную страницу.", "HOME-02.c2": "Корректно отображается на мобильном и компьютере.", "HOME-03.n": "Блок Museums & Living Heritage", "HOME-03.ne": "Выделяет избранные музеи и площадки живого наследия с изображением и названием. Ссылка «Смотреть все» ведёт на полную страницу Museums.", "HOME-03.c0": "Избранные музеи видны с изображением и названием.", "HOME-03.c1": "Клик по карточке открывает страницу музея.", "HOME-03.c2": "«Смотреть все» ведёт на страницу Museums.", "HOME-04.n": "Блок Guided Tours", "HOME-04.ne": "Раздел, представляющий экскурсии с гидом — несколько туров показаны с названием, длительностью и ценой. Побуждает пользователя выбрать и забронировать тур.", "HOME-04.c0": "Туры отображаются на карточках с названием, длительностью и ценой.", "HOME-04.c1": "Клик по карточке ведёт к деталям тура.", "HOME-04.c2": "«Все туры» переходит на страницу Tours.", "HOME-06.n": "Блок превью интерактивной карты", "HOME-06.ne": "Показывает небольшое превью полной интерактивной карты. Пользователь видит карту города и может перейти к полному опыту карты.", "HOME-06.c0": "Видна уменьшенная версия карты.", "HOME-06.c1": "Клик открывает страницу полной интерактивной карты.", "HOME-05.n": "Блок Cultural Life & Events", "HOME-05.ne": "Показывает ближайшие события и культурную жизнь с датой и названием. Пользователь видит, что и когда происходит, и может перейти к событию.", "HOME-05.c0": "Ближайшие события видны с датой и названием.", "HOME-05.c1": "Клик по событию открывает его детали.", "HOME-05.c2": "Если событий нет, показывается подходящее сообщение.", "HOME-07.n": "Блок Deals & Offers", "HOME-07.ne": "Показывает активные скидки и специальные предложения. Направляет пользователя воспользоваться выгодными предложениями.", "HOME-07.c0": "Активные предложения видны карточками.", "HOME-07.c1": "Клик ведёт к деталям/покупке предложения.", "HOME-07.c2": "Истёкшие предложения не показываются.", "HOME-08.n": "Блок The Stories", "HOME-08.ne": "Показывает истории и статьи об Ичеришехер с изображением и заголовком. Для контент-маркетинга и глубокого интереса.", "HOME-08.c0": "Истории видны с изображением и заголовком.", "HOME-08.c1": "Клик открывает полную историю.", "HOME-09.n": "Блок Press & Media Hub", "HOME-09.ne": "Раздел со ссылками на материалы для прессы и медиа (новости, пресс-релизы).", "HOME-09.c0": "Видны ссылки для медиа/прессы.", "HOME-09.c1": "Клик ведёт на соответствующую страницу или файл.", "EXP.name": "Explore", "EXP.desc": "Раздел исследования города — все интересные места с поиском, фильтрами и интерактивной картой.", "EXP-01.n": "Панель поиска", "EXP-01.ne": "Пользователь может ввести название места, площадки или впечатления и найти его. По мере ввода предлагаются подходящие результаты.", "EXP-01.c0": "Можно ввести ключевое слово и выполнить поиск.", "EXP-01.c1": "Подходящие результаты показываются списком.", "EXP-01.c2": "Если результатов нет, появляется подходящее сообщение.", "EXP-02.n": "Мультифильтр (категория, время, интерес, Pass)", "EXP-02.ne": "Фильтрует результаты по категории, необходимому времени, сфере интересов и включённости в Pass. Пользователь быстро находит подходящие места.", "EXP-02.c0": "Несколько фильтров можно применять одновременно.", "EXP-02.c1": "При изменении фильтра результаты обновляются.", "EXP-02.c2": "Фильтры можно сбросить.", "EXP-03.n": "Плитки категорий", "EXP-03.ne": "Показывает основные категории (музей, тур, ресторан, мечеть и т.д.) крупными кликабельными плитками. Быстрая точка входа.", "EXP-03.c0": "Категории отображаются плитками.", "EXP-03.c1": "Клик по плитке фильтрует/открывает эту категорию.", "EXP-04.n": "Интерактивная карта (100+ POI)", "EXP-04.ne": "Показывает более 100 точек интереса (POI) на карте города. Пользователь может масштабировать карту и кликать по точкам для просмотра информации.", "EXP-04.c0": "Точки отображаются в правильных местах на карте.", "EXP-04.c1": "Клик по точке открывает короткий информационный балун.", "EXP-04.c2": "Карту можно масштабировать и перемещать.", "EXP-04.c3": "Точки можно фильтровать по категории.", "EXP-05.n": "Переключение Map / List", "EXP-05.ne": "Пользователь может переключаться между просмотром результатов на карте и списком.", "EXP-05.c0": "Одна кнопка переключает между картой и списком.", "EXP-05.c1": "В обоих видах показываются одни и те же результаты.", "EXP-09.n": "Детальная страница POI", "EXP-09.ne": "Полная страница, открывающаяся при клике на точку интереса — фото, описание, часы работы, расположение и связанные места. Пользователь видит всё необходимое для решения.", "EXP-09.c0": "Показываются фото, описание и часы работы.", "EXP-09.c1": "Есть расположение на карте и   h+='<div class="toc">';
  az.sections.forEach(function(s){
    h+='<a href="#sec-'+s.code+'"><span class="tnum">'+s.num+'</span> '+esc(T(l,s.code+'.name',s.name))+'</a>';
  });
  h+='</div>';
  h+='<div class="howto"><h3>'+esc(ui.howto)+'</h3><ul>';
  az.howto.forEach(function(x,i){
    var t=T(l,'H.'+i,x), ci=t.indexOf(':');
    if(ci>-1){h+='<li><b>'+esc(t.slice(0,ci+1))+'</b>'+esc(t.slice(ci+1))+'</li>';}
    else{h+='<li>'+esc(t)+'</li>';}
  });
  h+='</ul></div>';
  az.sections.forEach(function(s){
    h+='<section id="sec-'+s.code+'" class="sec">';
    h+='<h2><span class="snum">'+s.num+'</span> '+esc(T(l,s.code+'.name',s.name))+' <span class="scode">'+s.code+'</span></h2>';
    if(s.track) h+='<div class="trk">'+esc(P.ui[l].track)+': <b>'+esc(s.track)+'</b></div>';
    if(s.desc) h+='<p class="sdesc">'+esc(T(l,s.code+'.desc',s.desc))+'</p>';
    s.fns.forEach(function(f){
      var pcls=f.pr.charAt(0)==='P'?f.pr:'PD';
      h+='<div class="fn"><div class="fnhead"><span class="fid">'+f.id+'</span><span class="fname">'+esc(T(l,f.id+'.n',f.name))+'</span><span class="pp '+pcls+'">'+esc(f.pr)+'</span></div>';
      if(f.ne) h+='<p class="ne"><b>'+esc(P.ui[l].ne)+'</b> '+esc(T(l,f.id+'.ne',f.ne))+'</p>';
      if(f.crit.length){
        h+='<p class="qm">'+esc(P.ui[l].qm)+'</p><ul class="crit">';
        f.crit.forEach(function(c,j){h+='<li>'+esc(T(l,f.id+'.c'+j,c))+'</li>';});
        h+='</ul>';
      }
      h+='</div>';
    });
    h+='</section>';
  });
  document.getElementById('wrap').innerHTML=h;
  document.documentElement.setAttribute('lang',l);
  var btns=document.querySelectorAll('#langsw button');
  for(var i=0;i<btns.length;i++){btns[i].classList.toggle('on',btns[i].getAttribute('data-lang')===l);}
  try{localStorage.setItem('rm-lang',l);}catch(e){}
}
document.getElementById('langsw').addEventListener('click',function(e){
  var b=e.target.closest('button'); if(!b)return;
  var hash=location.hash;
  render(b.getAttribute('data-lang'));
  if(hash){location.hash='';location.hash=hash;}
});
var saved='az'; try{var v=localStorage.getItem('rm-lang'); if(v&&P.ui[v])saved=v;}catch(e){}
render(saved);
</script>
</body></html>
